<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="margin: 0; padding: 0;">
    <div class="container-fluid" style="padding: 0;">
        <picture>
            <!-- Source for screens smaller than 500px -->
            <source media="(max-width: 500px)" srcset="TKD CDR inner page.jpg.jpeg">
            <!-- Source for screens smaller than 650px -->
            <source media="(max-width: 650px)" srcset="TKD CDR inner page.jpg.jpeg">
            <!-- Source for screens smaller than 768px -->
            <source media="(max-width: 768px)" srcset="TKD CDR inner page.jpg.jpeg">
            <!-- Source for screens smaller than 900px -->
            <source media="(max-width: 900px)" srcset="TKD CDR inner page.jpg.jpeg">
            <!-- Source for screens smaller than 1024px -->
            <source media="(max-width: 1024px)" srcset="TKD CDR inner page.jpg.jpeg">
            <!-- Source for screens smaller than 1200px -->
            <source media="(max-width: 1200px)" srcset="TKD CDR inner page.jpg.jpeg">
            <!-- Default image for larger screens -->
            <img src="TKD CDR inner page.jpg.jpeg" alt="Real Estate" style="width: 100%; height: auto; display: block;">
        </picture>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
